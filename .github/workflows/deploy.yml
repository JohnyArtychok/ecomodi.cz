name: Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist

  prepare-deploy:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Read locales config
        id: set-matrix
        run: |
          LOCALES=$(node -e "
            const fs = require('fs');
            const config = JSON.parse(fs.readFileSync('config/locales.json', 'utf8'));
            const locales = config.locales.map(l => ({
              code: l.code,
              environment: \`ftp-\${l.code}\`
            }));
            console.log(JSON.stringify(locales));
          ")
          echo "matrix={\"include\":$LOCALES}" >> $GITHUB_OUTPUT

  deploy:
    needs: [build, prepare-deploy]
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix: ${{ fromJson(needs.prepare-deploy.outputs.matrix) }}
      fail-fast: false
    environment: ${{ matrix.environment }}
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Check if secrets are available
        id: check-secrets
        continue-on-error: true
        run: |
          # In GitHub Actions, if secret doesn't exist, it's empty string
          # We check if both are non-empty
          if [ -n "${{ secrets.FTP_USERNAME }}" ] && [ -n "${{ secrets.FTP_PASSWORD }}" ]; then
            echo "✅ Secrets available for ${{ matrix.environment }}"
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️  Secrets not configured for ${{ matrix.environment }}"
            echo "available=false" >> $GITHUB_OUTPUT
          fi

      - name: Debug dist contents
        run: |
          echo "📁 Listing dist/${{ matrix.code }}:"
          ls -la dist/${{ matrix.code }} || true
          echo ""
          echo "📁 Listing dist/${{ matrix.code }}/css:"
          ls -la dist/${{ matrix.code }}/css || true
          echo ""
          echo "📁 Listing dist/${{ matrix.code }}/js:"
          ls -la dist/${{ matrix.code }}/js || true

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Deploy CSS & JS for ${{ matrix.code }}
        if: |
          hashFiles(format('dist/{0}/css/**', matrix.code)) != '' &&
          steps.check-secrets.outputs.available == 'true'
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp sftp://ftp.myshoptet.com:22 <<LFTP_EOF
          set cmd:fail-exit yes
          set sftp:auto-confirm yes
          set sftp:connect-program "ssh -a -x -o BatchMode=no -o StrictHostKeyChecking=no"
          set net:max-retries 2
          set net:timeout 20
          user "$FTP_USERNAME" "$FTP_PASSWORD"
          mkdir -p -f "jankolonicny/${{ matrix.code }}/css"
          mirror -R --no-perms --verbose dist/${{ matrix.code }}/css/ "jankolonicny/${{ matrix.code }}/css/"
          mkdir -p -f "jankolonicny/${{ matrix.code }}/js"
          mirror -R --no-perms --verbose dist/${{ matrix.code }}/js/ "jankolonicny/${{ matrix.code }}/js/"
          bye
          LFTP_EOF

      - name: Skip deploy – no build output
        if: ${{ hashFiles(format('dist/{0}/css/**', matrix.code)) == '' }}
        run: |
          echo "⚠️  No build artifacts found for ${{ matrix.code }}. Skipping upload."

      - name: Skip deploy – secrets not configured
        if: |
          hashFiles(format('dist/{0}/css/**', matrix.code)) != '' &&
          steps.check-secrets.outputs.available != 'true'
        run: |
          echo "⚠️  Skipping deployment for ${{ matrix.code }}: secrets not configured in environment '${{ matrix.environment }}'"
          echo "💡 To enable deployment, add FTP_USERNAME and FTP_PASSWORD secrets to the '${{ matrix.environment }}' environment in GitHub repository settings."

